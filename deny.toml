# cargo-deny configuration for cardpack.
#
# Run: `make deny` (full check) or `make audit` (advisories only).
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Don't restrict targets — we want to lint deps for every supported
# platform including wasm32-unknown-unknown.
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ── Advisories: vulnerabilities, yanked crates, unmaintained warnings.
[advisories]
yanked = "warn"
ignore = []

# ── Licenses: every transitive dep must offer at least one allowed license.
[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

# ── Bans: duplicate-version detection, banned crates.
[bans]
# Some transitive deps still hold thiserror 1.x while we use 2.x.
# Warn so we notice when it can be cleaned up, but don't block CI.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
# Domain-kernel purity: these format / presentation / i18n / runtime / transport
# crates are adapter concerns and must NOT appear in the default (pure) build.
# `[graph]` above uses default features (no-default-features = false), and
# `default = []` makes that the pure kernel — so cargo-deny checks the pure
# graph, where these are absent. They remain reachable behind opt-in features
# (`yaml`, `colored-display`, `i18n`, ...). See
# docs/audit-2026-07-18-domain-kernel.md (Invariants 2 & 4).
deny = [
    # Concrete serialization FORMATS (the `serde` trait itself is fine):
    { name = "serde_norway" },
    { name = "serde_yaml" },
    { name = "serde_yaml_bw" },
    # Terminal / presentation:
    { name = "colored" },
    # i18n / localization (embeds locale assets):
    { name = "fluent-templates" },
    { name = "fluent-bundle" },
    # Async runtimes / transport / RPC / HTTP (future-proofing — not deps today):
    { name = "tokio" },
    { name = "async-std" },
    { name = "reqwest" },
    { name = "hyper" },
    { name = "tonic" },
    { name = "axum" },
    # Storage engines:
    { name = "rusqlite" },
    { name = "sqlx" },
]
skip = []
skip-tree = []

# ── Sources: only the official crates.io index, no git or vendored sources.
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
