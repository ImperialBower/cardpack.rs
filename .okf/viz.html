const NODES=[{"id": "architecture/card-model", "type": "Architecture", "title": "Card model \u2014 Pip, BasicCard, Card, Pile", "description": "The four-layer generic card model and the traits (DeckedBase, Decked, Ranged) that turn a type into a deck.", "tags": ["architecture", "types", "generics"], "group": "architecture", "sz": 35, "body": "# The layered model\n\nFrom smallest to largest (all in `src/basic/types/`):\n\n| Type | File | Role |\n|---|---|---|\n| `Pip` | `pips.rs` | Atomic rank-or-suit facet: symbol, index char, and a **weight** used for sorting/precedence |\n| `BasicCard` | `basic_card.rs` | Rank `Pip` + suit `Pip`, no generic constraints \u2014 the raw data of a card |\n| `Card\u003cT>` | `card.rs` | Generic wrapper around `BasicCard` where `T: DeckedBase` binds the card to a deck vocabulary |\n| `Pile\u003cT>` | `pile.rs` | Ordered collection of `Card\u003cT>`: construct, draw, sort, shuffle, extract, validate |\n\nKey consequence: **weight lives inside the card**. Sorting is data-driven, so\nan Ace-low game needs a separate deck type with inverted rank weights (the\n`Razz` deck is the shipped example) rather than a comparator.\n\n# Traits (`src/basic/types/traits.rs`)\n\n* **`DeckedBase`** \u2014 what a type must provide to *be* a deck: `base_vec()`\n  (the canonical `Vec\u003cBasicCard>`), `colors()`, `deck_name()`,\n  `fluent_deck_key()`. Implementing it on a marker struct is the whole\n  extension mechanism ([extending decks](/decks/extending-decks.md)).\n* **`Decked\u003cT>`** \u2014 convenience layer: `T::deck()`, `T::decks(n)` (multi-deck\n  games like Hand and Foot), `validate()`.\n* **`Ranged`** \u2014 combinatorics (`combos(k)` etc.); every deck gets it. The\n  funky engine reuses it for poker-hand detection.\n\n# Conventions\n\n* Canonical deck order is high-to-low rank, suit-major (spades \u2192 hearts \u2192\n  diamonds \u2192 clubs for French-family decks).\n* Two string forms round-trip: symbol strings (`A\u2660 K\u2660 \u2026`) and index strings\n  (`AS KS \u2026`). Jokers use `B`/`L` (big/little) with suit symbol `\ud83c\udcdf`.\n* `draw(n)` is all-or-nothing (`Option`); `draw_first`/`draw_last` deal from\n  top/bottom. Note: top-of-deck is the *front* of the vector today\n  (`remove(0)`, O(n)) \u2014 a tracked refactor candidate in\n  [docs/TECHNICAL_DEBT.md](../../docs/TECHNICAL_DEBT.md).\n* Macros (`card!`, `cards!`, `french_cards!`) parse index strings into typed\n  cards.\n\n# Citations\n\n[1] [src/lib.rs module docs](../../src/lib.rs)\n[2] [DECON-01 Card Model](../../docs/deconstruct/DECON-01_Card_Model_And_Ordering.md)\n[3] [DECON-02 Pile Operations](../../docs/deconstruct/DECON-02_Pile_Operations.md)"}, {"id": "architecture/crate-overview", "type": "Rust Crate", "title": "cardpack \u2014 Generic Deck of Cards", "description": "Pure-by-default no_std Rust library modeling playing-card decks, with opt-in std, i18n, serde, YAML, and a Balatro-style engine.", "tags": ["crate", "overview", "no_std"], "group": "architecture", "sz": 32, "body": "# What it is\n\n`cardpack` (v0.8.1, Rust 2024 edition, MSRV 1.85, Apache-2.0) is a generic\npack-of-cards library. Its responsibilities:\n\n* Represent specific types of card decks ([deck catalog](/decks/deck-catalog.md)).\n* Validate that a collection of cards is valid for a deck type.\n* Render/parse textual representations (symbol strings like `A\u2660`, index\n  strings like `AS`).\n* Shuffle \u2014 including deterministic seeded shuffle that works under `no_std`.\n* Localize card names via Project Fluent\n  ([localization](/architecture/localization.md)).\n\nA bare dependency is an **alloc-only, `no_std`, no-I/O domain kernel**; every\ndependency-bearing capability is opt-in via Cargo features\n([feature flags](/architecture/feature-flags.md),\n[domain kernel](/architecture/domain-kernel.md)).\n\n# Module map (`src/lib.rs`)\n\n| Module | Gate | Contents |\n|---|---|---|\n| `basic` | always | Core types ([card model](/architecture/card-model.md)) and all shipped decks |\n| `common` | always | Errors (`thiserror`) and utilities |\n| `funky` | `funky` feature | Balatro-style engine ([funky engine](/architecture/funky-engine.md)) |\n| `localization` | `i18n` feature | Fluent locales |\n| `prelude` | always | `use cardpack::prelude::*` \u2014 the intended import surface |\n| `preludes::funky` | `funky` feature | Prelude for the funky engine |\n\n# Lint posture\n\n`src/lib.rs` warns on `clippy::all/pedantic/nursery/cargo/suspicious` plus\n`unwrap_used`/`expect_used` in production paths; `unwrap`/`expect` are allowed\nunder `cfg(test)`. CI keeps the whole crate clippy-pedantic-clean at\n`--all-targets`.\n\n# Citations\n\n[1] [Cargo.toml](../../Cargo.toml)\n[2] [src/lib.rs](../../src/lib.rs)\n[3] [README.md](../../README.md)"}, {"id": "architecture/domain-kernel", "type": "Architecture", "title": "Domain-kernel posture", "description": "cardpack is a value-type domain kernel \u2014 pure by default, no I/O in the core, format crates kept out of the public API.", "tags": ["architecture", "purity", "domain-kernel", "audit"], "group": "architecture", "sz": 32, "body": "# The pattern\n\nThe crate follows the **domain-kernel** pattern: a pure, delivery-agnostic\ncore behind a narrow boundary. It is a *value/collection* kernel (cards, pips,\npiles, decks) rather than a state-machine kernel \u2014 there is no game state, no\nacting parties, no hidden information. The kernel's value is **purity +\nportability** (no_std, wasm, bare-metal), not a transition contract; a WIT/\ncomponent boundary was assessed and explicitly *not* recommended.\n\n# Invariants enforced\n\n1. **Pure \u2014 no I/O of its own.** The only filesystem touch in the whole crate\n   is `BasicCard::cards_from_yaml_file`, quarantined behind the `std-io`\n   feature ([decision](/decisions/std-io-outside-full.md)). The historical\n   violation \u2014 `Razz::base_vec()` reading `razz.yaml` from the CWD at runtime,\n   silently returning an empty deck on failure \u2014 was fixed by embedding the\n   YAML with `include_str!`.\n2. **No format/transport crate in the public API.** Errors are boxed;\n   `serde_norway::Error` does not leak.\n3. **Pure by default.** `default = []`\n   ([feature flags](/architecture/feature-flags.md)). This was the other 2026-07\n   audit finding: defaults used to pull in presentation, YAML, i18n, and\n   fs-loading.\n4. **Delivery-agnostic.** CI gates no_std/alloc, wasm32, and bare-metal\n   (`thumbv7em-none-eabihf`) builds ([build and test](/workflows/build-and-test.md)).\n\n# Where it's documented\n\nThe authoritative assessment is\n[docs/audit-2026-07-18-domain-kernel.md](../../docs/audit-2026-07-18-domain-kernel.md)\n(scorecard, findings, fix sequencing). Cargo.toml's `[features]` comment cites\nit as \"Invariant 3.\"\n\n# Citations\n\n[1] [docs/audit-2026-07-18-domain-kernel.md](../../docs/audit-2026-07-18-domain-kernel.md)\n[2] [Cargo.toml](../../Cargo.toml)"}, {"id": "architecture/feature-flags", "type": "Architecture", "title": "Cargo feature flags", "description": "The pure-by-default feature matrix \u2014 default is an alloc-only no_std kernel; std, i18n, color, yaml, serde, std-io, and funky are opt-in.", "tags": ["features", "cargo", "no_std", "purity"], "group": "architecture", "sz": 33, "body": "# Principle\n\n`default = []`. A bare `cardpack` dependency is an alloc-only, `no_std`,\nno-I/O kernel ([domain kernel](/architecture/domain-kernel.md)). Everything\nelse is opt-in.\n\n# Matrix\n\n| Feature | In `full`? | Pulls in | Turns on |\n|---|---|---|---|\n| `full` | \u2014 | everything below except `std-io`/`funky` | `std` + `i18n` + `colored-display` + `yaml` + `serde` |\n| `std` | yes | libstd | thread-RNG shuffle, `draw_random`, etc. |\n| `alloc` | (implied) | \u2014 | base of the kernel; `serde?/alloc` |\n| `i18n` | yes | `fluent-templates` (implies `std`) | `FluentName`, `Named`, `Card::fluent_name*`, [localization](/architecture/localization.md) |\n| `colored-display` | yes | `colored` (implies `std`) | `Color`, `Card::color*`, `Pile::to_color_*` |\n| `yaml` | yes | `serde_norway` (implies `std`, `serde`) | `BasicCard::cards_from_yaml_str` (pure, in-memory), the `Razz` deck |\n| `serde` | yes | `serde` (implies `alloc`) | `Serialize`/`Deserialize` derives on `Pip`/`Card`/`Pile` etc. |\n| `std-io` | **no** | (implies `std`, `yaml`) | `BasicCard::cards_from_yaml_file` \u2014 the crate's one filesystem seam; deliberately excluded from `full` ([decision](/decisions/std-io-outside-full.md)) |\n| `funky` | **no** | (implies `std`) | Balatro-style engine ([funky engine](/architecture/funky-engine.md)) |\n\n# Gotchas\n\n* `yaml` implies `serde` \u2014 it deserializes into the serde-derived structs.\n* Deck-from-YAML **without** the filesystem is available under plain `yaml`:\n  `cards_from_yaml_str` + compile-time `include_str!` (how `Razz` works).\n* `rand`'s `std_rng` feature is enabled unconditionally, *not* gated on\n  `std` \u2014 see [the rand decision](/decisions/rand-std-rng-unconditional.md)\n  before \"cleaning that up.\"\n* Doctests that need optional features are marked `ignore` with a comment so\n  `cargo test --no-default-features` stays green.\n\n# Citations\n\n[1] [Cargo.toml `[features]`](../../Cargo.toml)\n[2] [README \"Cargo features\"](../../README.md)"}, {"id": "architecture/funky-engine", "type": "Architecture", "title": "Funky \u2014 the Balatro-style engine", "description": "std-only feature-gated module modeling Balatro cards, jokers, scoring, shop, and vouchers on top of the core card model; EPIC-01 closed 2026-07-18 with named deferrals.", "tags": ["funky", "balatro", "feature-gated", "scoring"], "group": "architecture", "sz": 33, "body": "# What it is\n\n`src/funky/` (behind `funky = [\"std\"]`) models\n[Balatro](https://www.playbalatro.com/)-style cards well enough to (a) power a\nBalatro **score solver** and (b) enable **custom mod decks**. It layers on the\ncore [card model](/architecture/card-model.md) rather than forking it.\n\n# Key constructs\n\n* **`BuffoonCard`** (`funky/types/buffoon_card.rs`) \u2014 embeds core `Pip`s for\n  suit/rank, adds `card_type: BCardType`, `enhancement: MPip`, `resell_value`,\n  `debuffed`, `Edition`.\n* **`MPip`** (`funky/types/mpip.rs`) \u2014 the big idea: a ~69-variant enum making\n  card effects **data, not code**; interpreted at scoring time by\n  `calculate_plus_*` match arms.\n* **`BuffoonPile`** \u2014 implements the core `Ranged` trait so combinatorics and\n  hand detection delegate to the mature `basic` engine.\n* **Scoring** \u2014 four-phase chips \u00d7 mult pipeline (`score()` /\n  `score_with_seed()`): base + played cards + held \u00d7mult + jokers left-to-right;\n  never panics; seeded shuffle for determinism.\n* **Decks** (`funky/decks/`): basic (52/Abandoned 40/Checkered), 112 jokers,\n  12 planets, 22 tarot, 18 spectral.\n* **Economy**: `Shop` (stock, rerolls, booster packs, voucher slot), 20 wired\n  `Voucher`s, `sell_joker`, blind state with 3 boss blinds.\n\n# Status (EPIC-01, closed 2026-07-18)\n\nAll five child EPICs (01a\u201301e) are closed; both stated goals are structurally\nmet. **Named deferrals** to future EPICs: Seals (blocks 4 seal spectrals),\nmost Decks (~3 of 16), Antes/Bosses, Tags, Serde. 8 of 112 jokers stay `Blank`\nwith a test-enforced reason list (`BLANK_WITH_REASON`).\n\n# Try it\n\n```shell\ncargo run --example buffoon --features funky      # 4-phase scoring, phase by phase\ncargo run --example funky_tour --features funky   # seeded tour: rounds, editions, shop, spectrals\n```\n\n# Citations\n\n[1] [docs/EPIC-01_Funky.md](../../docs/EPIC-01_Funky.md)\n[2] [README \"Funky\"](../../README.md)\n[3] [docs/2026-07-11-effect-registry-design.md](../../docs/2026-07-11-effect-registry-design.md)"}, {"id": "architecture/localization", "type": "Architecture", "title": "Localization (Fluent i18n)", "description": "Card, rank, and suit names resolve per locale via Project Fluent \u2014 en-US, de, fr, la (Latin), tlh (Klingon) \u2014 behind the i18n feature.", "tags": ["i18n", "fluent", "locales"], "group": "architecture", "sz": 31, "body": "# How it works\n\nBehind the `i18n` feature (implies `std`), `src/localization/` uses\n[fluent-templates](https://github.com/XAMPPRocky/fluent-templates) to resolve\ncard names. `Card::fluent_name_default()` gives English;\n`Card::fluent_name(&FluentName::DEUTSCH)` etc. select a locale. Each deck type\ncarries a `fluent_deck_key()` ([card model](/architecture/card-model.md))\nthat routes lookups to the right `.ftl` resource set (`french`, `skat`,\n`tarot`).\n\n# Locales\n\n| Locale | Dir | Notes |\n|---|---|---|\n| English | `locales/en-US/` | reference locale |\n| German | `locales/de/` | |\n| French | `locales/fr/` | has a README on translation confidence |\n| Latin | `locales/la/` | draft-tier; see `docs/2026-04-29-la-tlh-locales-design.md` |\n| Klingon | `locales/tlh/` | draft-tier; same design doc |\n\nDraft locales use **confidence tiering** \u2014 see DECON-07 for the contract.\n\n# Known tension\n\nThe `fluent_*` path in `card.rs` carries `HACK` markers: the author suspects\nfluent-templates may be outliving its usefulness, with \"deck from YAML\"\nfloated as the successor direction\n([docs/TECHNICAL_DEBT.md](../../docs/TECHNICAL_DEBT.md)). Treat major\ninvestment here with caution.\n\n# Citations\n\n[1] [src/localization/](../../src/localization.rs)\n[2] [DECON-07 Localization](../../docs/deconstruct/DECON-07_Localization.md)\n[3] [docs/2026-04-29-la-tlh-locales-design.md](../../docs/2026-04-29-la-tlh-locales-design.md)"}, {"id": "decisions/rand-std-rng-unconditional", "type": "Decision", "title": "rand's std_rng stays unconditional", "description": "rand's std_rng feature is deliberately NOT gated on cardpack's std feature \u2014 moving it re-breaks seeded shuffle for no_std consumers.", "tags": ["decision", "rand", "no_std", "invariant"], "group": "decisions", "sz": 28, "body": "# Decision\n\nIn `Cargo.toml`, `rand = { \u2026, features = [\"std_rng\"] }` is unconditional \u2014\n**not** listed under cardpack's `std` feature.\n\n# Why\n\n`shuffle_with_seed` / `shuffled_with_seed` use `StdRng` and must work under\n`no_std` (a core promise of the [domain kernel](/architecture/domain-kernel.md)\n\u2014 determinism is part of the DECON-03 contract). In rand 0.9, `std_rng` only\npulls in `rand_chacha`, with no transitive `std`, so keeping it always-on is\nsound.\n\n# How to apply\n\nA tidy-minded refactor that moves `std_rng` under `std = [ \u2026, \"rand/std_rng\" ]`\nwill pass std-enabled CI but silently break seeded shuffle for `no_std`\nconsumers. The Cargo.toml comment says: **do NOT move it**. `make no-std`\n([build and test](/workflows/build-and-test.md)) is the guard that catches\nthis.\n\n# Citations\n\n[1] [Cargo.toml rand dependency comment](../../Cargo.toml)\n[2] [DECON-03 Shuffling and Determinism](../../docs/deconstruct/DECON-03_Shuffling_And_Determinism.md)"}, {"id": "decisions/std-io-outside-full", "type": "Decision", "title": "std-io is excluded from full", "description": "The one filesystem API (cards_from_yaml_file) sits behind its own std-io feature, deliberately left out of the full umbrella so both kernel and convenience stack stay I/O-free.", "tags": ["decision", "purity", "features", "io"], "group": "decisions", "sz": 29, "body": "# Decision\n\n`BasicCard::cards_from_yaml_file` (reads a deck from a YAML *file* via\n`std::fs`) is the crate's **only** filesystem seam. It lives behind the\n`std-io` feature (`std-io = [\"std\", \"yaml\"]`), which is intentionally **not**\npart of the `full` umbrella.\n\n# Why\n\nKeeps both the pure kernel *and* the batteries-included `full` stack I/O-free\n(Invariant 1 of the [domain kernel](/architecture/domain-kernel.md)). Users\nwho want file loading must name the capability explicitly. Deck-from-YAML\nwithout the filesystem already exists under plain `yaml`:\n`cards_from_yaml_str` + `include_str!` (the `Razz` pattern \u2014\n[extending decks](/decks/extending-decks.md)).\n\n# How to apply\n\n* Don't add `std-io` to `full` \"for convenience\" \u2014 that reintroduces the\n  audit's Invariant-1/3 violation.\n* New I/O-adjacent APIs belong behind `std-io` (or a new named seam), never\n  in the core or in `full`.\n* `make test-std-io` exercises the seam separately\n  ([build and test](/workflows/build-and-test.md)).\n\n# Citations\n\n[1] [Cargo.toml std-io comment](../../Cargo.toml)\n[2] [docs/audit-2026-07-18-domain-kernel.md](../../docs/audit-2026-07-18-domain-kernel.md)"}, {"id": "decks/deck-catalog", "type": "Catalog", "title": "Shipped deck catalog", "description": "The 12 deck kinds the crate ships, their sizes, and their quirks; DeckKind is the runtime registry over all of them.", "tags": ["decks", "catalog", "registry"], "group": "decks", "sz": 32, "body": "# The 12 deck kinds\n\nAll in `src/basic/decks/`, each a marker struct implementing `DeckedBase`\n([card model](/architecture/card-model.md)):\n\n| Deck | Cards | Notes |\n|---|---|---|\n| `French` | 54 | Foundation deck: 13 ranks \u00d7 4 suits + Big/Little jokers; most others derive from its `FrenchBasicCard` consts |\n| `Standard52` | 52 | French minus jokers; home of the `card!`/`cards!` macros |\n| `Short` | 36 | Ranks 6 through Ace (six-plus hold'em) |\n| `Spades` | 52 | French with jokers, minus 2\u2663 and 2\u2666 |\n| `Euchre24` | 24 | 24-card Euchre variant |\n| `Euchre32` | 32 | 32-card Euchre variant |\n| `Pinochle` | 48 | Two copies of 9\u2013Ace; **Ten outranks King** |\n| `Canasta` | 108 | 2 modern decks, red 3s promoted to jokers |\n| `Skat` | 32 | German suits/ranks (own `.ftl` locale files) |\n| `Tarot` | 78 | 22 Major + 56 Minor Arcana, trump precedence |\n| `Razz` | 52 | **Ace-low** (inverted rank weights); built from YAML via `include_str!`; requires the `yaml` feature |\n| `Tiny` | 4 | A\u2660 K\u2660 A\u2665 K\u2665 \u2014 minimal teaching/testing deck |\n\n# The registry\n\n`DeckKind` (`src/basic/decks/registry.rs`) is a runtime enum over all 12 \u2014\n`DeckKind::all()`, `.deck_name()`, `.base_vec()`, `.fluent_deck_key()` \u2014 for\n\"give me every deck this crate ships\" use-cases the generic\n`Pile\u003cDeckType>` API can't express.\n\n# No dedicated multi-deck types\n\nHand-and-Foot-style games use `French::decks(n)` (4 players \u2192 216 cards)\ninstead of a bespoke deck type.\n\n# Citations\n\n[1] [src/basic/decks/registry.rs](../../src/basic/decks/registry.rs)\n[2] [DECON-05 French Deck Family](../../docs/deconstruct/DECON-05_French_Deck_Family.md)\n[3] [DECON-06 Tarot and Skat](../../docs/deconstruct/DECON-06_Tarot_And_Skat.md)"}, {"id": "decks/extending-decks", "type": "Playbook", "title": "Creating a custom deck", "description": "Consumers author new deck vocabularies with the same machinery as shipped decks \u2014 implement DeckedBase on a marker struct, then Decked for free methods.", "tags": ["decks", "extension", "playbook"], "group": "decks", "sz": 30, "body": "# Steps\n\n1. Define a marker struct (e.g. `struct Tiny {}`) with a `const DECK: [BasicCard; N]`\n   \u2014 reuse shipped consts like `FrenchBasicCard::ACE_SPADES` or define new\n   `Pip`s with your own weights.\n2. Implement `DeckedBase`: `base_vec()`, `colors()`, `deck_name()`,\n   `fluent_deck_key()` (reuse e.g. `FLUENT_KEY_BASE_NAME_FRENCH` if names map\n   onto an existing locale set).\n3. `impl Decked\u003cTiny> for Tiny {}` \u2014 unlocks `Tiny::deck()`, `decks(n)`,\n   `validate()`. `Ranged` (combos) comes automatically.\n4. Optionally add a `macro_rules!` helper for terse card literals.\n5. **Verify with `YourDeck::validate()`** \u2014 the fundamental correctness test.\n\nThe full worked example lives in the `src/lib.rs` doc comment (\"Custom Deck\nexample\") and `src/basic/decks/tiny.rs` is the in-tree version.\n\n# Alternative: decks from YAML\n\nWith the `yaml` feature, deck data can live in a YAML file deserialized by\n`BasicCard::cards_from_yaml_str` \u2014 pair with `include_str!` for a pure,\ncompile-time-embedded deck (this is exactly how\n[`Razz`](/decks/deck-catalog.md) works). Sorting behavior (e.g. Ace-low) is\ncontrolled purely by the weights in the data\n([card model](/architecture/card-model.md)).\n\n# Citations\n\n[1] [src/lib.rs \"Custom Deck example\"](../../src/lib.rs)\n[2] [DECON-08 Extension and Registry](../../docs/deconstruct/DECON-08_Extension_And_Registry.md)"}, {"id": "getting-started", "type": "Reference", "title": "Getting started \u2014 cardpack.rs Knowledge Bundle", "description": "How this bundle is organized and where to start reading.", "tags": ["getting-started", "meta"], "group": "(root)", "sz": 28, "body": "# Overview\n\nThis bundle captures durable knowledge about **cardpack.rs**, a generic\ndeck-of-cards library in Rust. Start with the\n[crate overview](/architecture/crate-overview.md), then follow links by need:\n\n* Understanding the type system \u2192 [card model](/architecture/card-model.md)\n* Choosing Cargo features \u2192 [feature flags](/architecture/feature-flags.md)\n* Why the crate is structured the way it is \u2192 [domain kernel](/architecture/domain-kernel.md)\n* What decks exist \u2192 [deck catalog](/decks/deck-catalog.md)\n* Building / testing / releasing \u2192 [build and test](/workflows/build-and-test.md)\n\n# Layout\n\n* `architecture/` \u2014 how the crate is designed and why.\n* `decks/` \u2014 the shipped deck vocabulary and how to extend it.\n* `workflows/` \u2014 build, test, CI, and WebAssembly workflows.\n* `decisions/` \u2014 load-bearing decisions that are easy to accidentally undo.\n* `references/` \u2014 map of the in-repo documentation this bundle distills."}, {"id": "references/docs-map", "type": "Reference", "title": "Map of the in-repo documentation", "description": "Where the deep documentation lives \u2014 DECON regeneration pack, EPICs, audits, design docs, technical debt \u2014 and which file is authoritative for what.", "tags": ["docs", "map", "reference"], "group": "references", "sz": 34, "body": "# Authoritative sources by topic\n\n| Topic | Authoritative doc |\n|---|---|\n| Language-agnostic behavioral spec + golden vectors | [docs/deconstruct/MANIFEST.md](../../docs/deconstruct/MANIFEST.md) \u2192 DECON-01\u202608 + `vectors/*.json` (regenerate via `cargo run --example deconstruct_vectors`) |\n| Kernel purity assessment | [docs/audit-2026-07-18-domain-kernel.md](../../docs/audit-2026-07-18-domain-kernel.md) (earlier: audit-2026-04-29, audit-2026-04-09) |\n| Balatro/funky scope & status | [docs/EPIC-01_Funky.md](../../docs/EPIC-01_Funky.md) + children 01a\u201301e (all closed 2026-07-18); next: [EPIC-02 Ganjifa](../../docs/EPIC-02_Ganjifa.md) |\n| Effect/mod registry design | [docs/2026-07-11-effect-registry-design.md](../../docs/2026-07-11-effect-registry-design.md) |\n| Seeded shuffle design | [docs/2026-04-29-seeded-shuffle-design.md](../../docs/2026-04-29-seeded-shuffle-design.md) |\n| Latin/Klingon locale design | [docs/2026-04-29-la-tlh-locales-design.md](../../docs/2026-04-29-la-tlh-locales-design.md) |\n| no_std/alloc migration design | [docs/superpowers/specs/2026-05-01-no-std-alloc-design.md](../../docs/superpowers/specs/2026-05-01-no-std-alloc-design.md) |\n| Outstanding work | [BACKLOG.md](../../BACKLOG.md) and [docs/TECHNICAL_DEBT.md](../../docs/TECHNICAL_DEBT.md) (maintained by the `/backlog` skill) |\n| WASM consumer setup | [docs/wasm.md](../../docs/wasm.md) ([wasm workflow](/workflows/wasm.md)) |\n| Release history | [CHANGELOG.md](../../CHANGELOG.md); [docs/release-v0.7.0.md](../../docs/release-v0.7.0.md) |\n\n# Conventions\n\n* **EPIC docs** (`docs/EPIC-NN_*.md`) are durable, phase-structured specs with\n  status tables; the EPIC is the single source of truth for its scope \u2014\n  TECHNICAL_DEBT.md mirrors it and has gone stale before (noted in-file).\n* **DECON docs** are the /deconstruct output: a contract such that any\n  implementation reproducing all golden vectors is a functional regeneration\n  of this crate, pinned to commit `24ad604` (2026-07-18).\n\n# Citations\n\n[1] [docs/deconstruct/MANIFEST.md](../../docs/deconstruct/MANIFEST.md)"}, {"id": "workflows/build-and-test", "type": "Playbook", "title": "Build, test, and quality gates", "description": "make (ayce) is the everything gate \u2014 fmt, build, three test layers, clippy-pedantic, MSRV, no_std, docs; plus mutants, miri, coverage, and deny.", "tags": ["workflow", "make", "ci", "testing"], "group": "workflows", "sz": 31, "body": "# Day-to-day\n\n```shell\nmake            # default target `ayce` (\"all you can eat\"):\n                # fmt \u2192 build \u2192 test-unit/doc/std-io \u2192 clippy \u2192 msrv \u2192 no-std \u2192 docs\nmake help       # list all targets\n```\n\nTest layers: `test-unit`, `test-doc` (101+ doctests), `test-std-io` (the\nfilesystem seam gets its own pass since `std-io` is outside `full` \u2014\n[decision](/decisions/std-io-outside-full.md)).\n\n# Portability gates\n\n* `make no-std` \u2014 builds `--no-default-features` including bare-metal\n  (`thumbv7em-none-eabihf`); dev-deps are target-gated in Cargo.toml so this\n  works.\n* `make build-wasm` / `make test-wasm` \u2014 wasm32 ([wasm](/workflows/wasm.md)).\n* `make msrv` \u2014 Rust 1.85 check.\n\n# Deeper verification\n\n* `make mutants` \u2014 cargo-mutants mutation testing.\n* `make miri`, `make coverage` (llvm-cov \u2192 codecov), `make bench` (criterion\n  `benches/draw.rs`), `make deny` / `make audit` / `make unused-deps`.\n* `make nightly` \u2014 nightly test + clippy.\n* Property tests: `tests/properties.rs` (proptest).\n\n# Conventions\n\n* Clippy runs at `-Dpedantic --all-targets` and must stay clean; `unwrap`/\n  `expect` are only allowed under `cfg(test)`.\n* CI is `.github/workflows/CI.yaml` (build/test badge on the README); codecov\n  tracks coverage.\n* Test framework: `rstest` for fixture/case tables.\n\n# Citations\n\n[1] [Makefile](../../Makefile)\n[2] [.github/workflows/CI.yaml](../../.github/workflows/CI.yaml)"}, {"id": "workflows/wasm", "type": "Playbook", "title": "WebAssembly support", "description": "cardpack compiles to wasm32-unknown-unknown with every feature combination; consumers must configure the getrandom wasm_js backend.", "tags": ["wasm", "portability", "getrandom"], "group": "workflows", "sz": 29, "body": "# Status\n\nThe crate builds cleanly for `wasm32-unknown-unknown` (browser WASM) with\nevery feature combination, a direct payoff of the\n[domain-kernel](/architecture/domain-kernel.md) posture.\n\n# The getrandom seam\n\n`rand 0.9 \u2192 rand_core 0.9 \u2192 getrandom 0.3` forces wasm32 consumers to pick a\nbackend, else builds fail with \"no backend selected\". cardpack pre-enables the\n`wasm_js` feature on `getrandom` for wasm targets in its own Cargo.toml, but\n**consumers still must set the cfg flag themselves**, typically in\n`.cargo/config.toml`:\n\n```toml\n[target.wasm32-unknown-unknown]\nrustflags = ['--cfg', 'getrandom_backend=\"wasm_js\"']\n```\n\n# Where to look\n\n* [docs/wasm.md](../../docs/wasm.md) \u2014 backend setup, recommended feature\n  combos, runtime gotchas.\n* [examples/wasm.rs](../../examples/wasm.rs) \u2014 working example.\n* `tests/wasm.rs` \u2014 wasm-bindgen-test suite (`make test-wasm`).\n\nSeeded shuffle works on wasm and no_std alike because `StdRng` comes from\nrand's `std_rng` feature, enabled unconditionally \u2014\n[see the decision](/decisions/rand-std-rng-unconditional.md).\n\n# Citations\n\n[1] [docs/wasm.md](../../docs/wasm.md)\n[2] [Cargo.toml wasm32 target section](../../Cargo.toml)"}], EDGES=[{"source": "architecture/card-model", "target": "decks/extending-decks"}, {"source": "architecture/crate-overview", "target": "decks/deck-catalog"}, {"source": "architecture/crate-overview", "target": "architecture/localization"}, {"source": "architecture/crate-overview", "target": "architecture/feature-flags"}, {"source": "architecture/crate-overview", "target": "architecture/domain-kernel"}, {"source": "architecture/crate-overview", "target": "architecture/card-model"}, {"source": "architecture/crate-overview", "target": "architecture/funky-engine"}, {"source": "architecture/domain-kernel", "target": "decisions/std-io-outside-full"}, {"source": "architecture/domain-kernel", "target": "architecture/feature-flags"}, {"source": "architecture/domain-kernel", "target": "workflows/build-and-test"}, {"source": "architecture/feature-flags", "target": "architecture/domain-kernel"}, {"source": "architecture/feature-flags", "target": "architecture/localization"}, {"source": "architecture/feature-flags", "target": "decisions/std-io-outside-full"}, {"source": "architecture/feature-flags", "target": "architecture/funky-engine"}, {"source": "architecture/feature-flags", "target": "decisions/rand-std-rng-unconditional"}, {"source": "architecture/funky-engine", "target": "architecture/card-model"}, {"source": "architecture/localization", "target": "architecture/card-model"}, {"source": "decisions/rand-std-rng-unconditional", "target": "architecture/domain-kernel"}, {"source": "decisions/rand-std-rng-unconditional", "target": "workflows/build-and-test"}, {"source": "decisions/std-io-outside-full", "target": "architecture/domain-kernel"}, {"source": "decisions/std-io-outside-full", "target": "decks/extending-decks"}, {"source": "decisions/std-io-outside-full", "target": "workflows/build-and-test"}, {"source": "decks/deck-catalog", "target": "architecture/card-model"}, {"source": "decks/extending-decks", "target": "decks/deck-catalog"}, {"source": "decks/extending-decks", "target": "architecture/card-model"}, {"source": "getting-started", "target": "architecture/crate-overview"}, {"source": "getting-started", "target": "architecture/card-model"}, {"source": "getting-started", "target": "architecture/feature-flags"}, {"source": "getting-started", "target": "architecture/domain-kernel"}, {"source": "getting-started", "target": "decks/deck-catalog"}, {"source": "getting-started", "target": "workflows/build-and-test"}, {"source": "references/docs-map", "target": "workflows/wasm"}, {"source": "workflows/build-and-test", "target": "decisions/std-io-outside-full"}, {"source": "workflows/build-and-test", "target": "workflows/wasm"}, {"source": "workflows/wasm", "target": "architecture/domain-kernel"}, {"source": "workflows/wasm", "target": "decisions/rand-std-rng-unconditional"}];
const PALETTE=["#6E56CF","#D97757","#22C55E","#3B82F6","#EAB308","#EC4899","#14B8A6","#F97316","#A855F7","#0EA5E9","#84CC16","#EF4444","#64748B"];
const byId=Object.fromEntries(NODES.map(n=>[n.id,n]));
const outL={}, inL={};
NODES.forEach(n=>{outL[n.id]=[];inL[n.id]=[];});
EDGES.forEach(e=>{outL[e.source].push(e.target);inL[e.target].push(e.source);});
const types=[...new Set(NODES.map(n=>n.type))].sort();
const color=Object.fromEntries(types.map((t,i)=>[t,PALETTE[i%PALETTE.length]]));
const off=new Set();
const cy=cytoscape({container:document.getElementById('cy'),minZoom:.2,maxZoom:1.6,wheelSensitivity:.2,
 elements:[...NODES.map(n=>({data:{...n,c:color[n.type]}})),...EDGES.map(e=>({data:e}))],
 style:[
  {selector:'node',style:{'background-color':'data(c)','label':'data(title)','color':'#e6e8ee',
   'font-size':10,'text-wrap':'wrap','text-max-width':120,'text-valign':'bottom','text-margin-y':4,
   'text-outline-width':2,'text-outline-color':'#0e0f13','min-zoomed-font-size':6,
   'width':'data(sz)','height':'data(sz)'}},
  {selector:'edge',style:{'width':1.2,'line-color':'#3a4150','target-arrow-color':'#3a4150',
   'target-arrow-shape':'triangle','arrow-scale':.8,'curve-style':'bezier','opacity':.7}},
  {selector:'.dim',style:{'opacity':.10}},{selector:'.hl',style:{'border-width':3,'border-color':'#fff'}}
 ],
 layout:{name:'cose',animate:false,nodeRepulsion:9000,idealEdgeLength:90,padding:40}});
const side=document.getElementById('side');
const esc=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function relList(title,arr){if(!arr.length)return'';
 return `<div class="rel"><h4>${title}</h4>${arr.map(id=>`<a data-go="${esc(id)}">${esc((byId[id]||{}).title||id)}</a>`).join('')}</div>`;}
function show(id){const n=byId[id];if(!n)return;const c=color[n.type];
 side.innerHTML=`<span class="type" style="background:${c}">${esc(n.type)}</span>
 <h2>${esc(n.title)}</h2><div class="desc">${esc(n.description)||'<span class=empty>no description</span>'}</div>
 <div class="tags">${(n.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
 ${relList('Links to',outL[id])}${relList('Cited by',inL[id])}
 <div class="body">${n.body?DOMPurify.sanitize(marked.parse(n.body)):'<span class=empty>empty body</span>'}</div>`;
 side.querySelectorAll('[data-go]').forEach(a=>a.onclick=()=>select(a.getAttribute('data-go')));}
function select(id){const ele=cy.getElementById(id);if(!ele.length)return;show(id);
 cy.elements().removeClass('hl').addClass('dim');const nb=ele.closedNeighborhood();nb.removeClass('dim');ele.addClass('hl');
 cy.animate({center:{eles:ele},duration:250});
 try{if(decodeURIComponent((location.hash||'').slice(1))!==id)location.hash=encodeURIComponent(id);}catch(e){}}
cy.on('tap','node',e=>select(e.target.id()));
cy.on('tap',e=>{if(e.target===cy)cy.elements().removeClass('dim hl');});
function applyFilter(){const q=document.getElementById('search').value.toLowerCase();const ty=document.getElementById('type').value;
 cy.batch(()=>cy.nodes().forEach(n=>{const d=n.data();
  const m=(!q||(d.title+' '+d.type+' '+d.description+' '+(d.tags||[]).join(' ')).toLowerCase().includes(q))
        &&(!ty||d.type===ty)&&!off.has(d.type);
  n.style('display',m?'element':'none');}));}
let debounce;
document.getElementById('search').oninput=()=>{clearTimeout(debounce);debounce=setTimeout(applyFilter,150);};
document.getElementById('type').oninput=applyFilter;
const tysel=document.getElementById('type');types.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;tysel.appendChild(o);});
let curLayout='cose';
document.getElementById('layout').onchange=e=>{const v=e.target.value;
 if(v==='cose'&&NODES.length>1000&&!confirm(`force layout on ${NODES.length} concepts can freeze this tab — run anyway?`)){e.target.value=curLayout;return;}
 curLayout=v;cy.layout({name:v,animate:true,padding:40,nodeRepulsion:9000,idealEdgeLength:90}).run();};
document.getElementById('legend').innerHTML=types.map(t=>`<span class="chip" data-t="${esc(t)}"><span class="dot" style="background:${color[t]}"></span>${esc(t)} (${NODES.filter(n=>n.type===t).length})</span>`).join('');
document.querySelectorAll('#legend .chip').forEach(ch=>ch.onclick=()=>{const t=ch.getAttribute('data-t');
 if(off.has(t)){off.delete(t);ch.classList.remove('off');}else{off.add(t);ch.classList.add('off');}applyFilter();});
document.getElementById('layout').value='cose';
const Q=new URLSearchParams(location.search),QL=Q.get('layout'),QS=Q.get('select');
if(QL&&[...document.querySelectorAll('#layout option')].some(o=>o.value===QL)){document.getElementById('layout').value=QL;curLayout=QL;cy.layout({name:QL,animate:false,padding:40,nodeRepulsion:9000,idealEdgeLength:90}).run();}
function fromHash(){try{const h=decodeURIComponent((location.hash||'').slice(1));if(h&&byId[h])select(h);}catch(e){}}
addEventListener('hashchange',fromHash);
if(QS&&byId[QS])select(QS);else fromHash();
</script></body></html>
