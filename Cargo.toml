[package]
name = "cardpack"
description = "Generic Deck of Cards"
version = "0.6.11"
authors = ["electronicpanopticon <gaoler@electronicpanopticon.com>"]
repository = "https://github.com/ImperialBower/cardpack.rs.git"
homepage = "https://github.com/ImperialBower/cardpack.rs"
edition = "2024"
rust-version = "1.85"
license = "Apache-2.0"
keywords = ["poker", "cards", "library"]
categories = ["game-development"] # https://crates.io/category_slugs
include = ["src/**", "Cargo.toml", "LICENSE", "README.md", "src/basic/decks/yaml/*.yaml"]

[lib]
name = "cardpack"
path = "src/lib.rs"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[features]
default = ["i18n", "colored-display", "yaml", "serde"]
i18n = ["dep:fluent-templates"]
colored-display = ["dep:colored"]
yaml = ["dep:serde_norway", "serde"]
serde = ["dep:serde"]

[dependencies]
colored = { version = "3.1", optional = true }
fluent-templates = { version = "0.13", optional = true }
itertools = "0.14.0"
log = "0.4.29"
rand = "0.9"
serde = { version = "1.0.219", features = ["derive"], optional = true }
serde_norway = { version = "0.9.42", optional = true }
thiserror = "2.0.18"

[dev-dependencies]
ckc-rs = "0.1.15"
clap = { version = "4.5", features = ["derive", "unicode"] }
env_logger = "0.11"
rstest = "0.25"
term-table = "1.4.0"

[[example]]
name = "demo"
required-features = ["i18n", "colored-display"]

[[example]]
name = "headandfoot"
required-features = ["i18n", "colored-display"]

[[example]]
name = "bridge"

[[example]]
name = "poker"

[[example]]
name = "poker_eval"

[[example]]
name = "range"
