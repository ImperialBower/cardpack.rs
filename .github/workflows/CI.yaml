name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    name: Rust ${{matrix.rust}}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [beta, stable, 1.85.0]
        include:
          - rust: nightly
            rustflags: --cfg thiserror_nightly_testing
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{matrix.rust}}
          components: rust-src
      - run: cargo test --all
        env:
          RUSTFLAGS: ${{matrix.rustflags}} ${{env.RUSTFLAGS}}
      # funky is a std-only, off-by-default feature that the default-feature
      # matrix above never compiles. Test it explicitly so regressions are gated.
      - run: cargo test --features funky
        env:
          RUSTFLAGS: ${{matrix.rustflags}} ${{env.RUSTFLAGS}}

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Check semver
        uses: obi1kenobi/cargo-semver-checks-action@v2
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy, rust-src
      - run: cargo clippy -- -Dclippy::all -Dclippy::pedantic
      # Lint everything the bare `cargo clippy` above misses: the funky
      # feature (off by default) plus all tests, examples, and benches
      # (`--all-targets`). `unwrap`/`expect` in tests are allowed via a
      # `cfg(test)` attribute in src/lib.rs.
      - run: cargo clippy --features funky --all-targets -- -Dclippy::all -Dclippy::pedantic

  fmt:
    name: Fmt
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, rust-src
      - run: cargo fmt --all -- --check

  doc:
    name: Doc
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    timeout-minutes: 45
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rust-src
      - run: cargo doc --no-deps --all-features

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - run: cargo build --target wasm32-unknown-unknown --all-features
      - run: cargo build --target wasm32-unknown-unknown --no-default-features
      - run: cargo build --target wasm32-unknown-unknown --example wasm

  wasm-test:
    name: WASM Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      # The wasm-bindgen CLI's schema must exactly match the wasm-bindgen crate
      # version in Cargo.lock, so read the version from the lockfile and install
      # that CLI — the pair can never drift.
      - name: Read wasm-bindgen version from Cargo.lock
        id: wbg
        run: echo "version=$(cargo pkgid wasm-bindgen | cut -d'@' -f2)" >> "$GITHUB_OUTPUT"
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@${{ steps.wbg.outputs.version }}
      - run: cargo test --target wasm32-unknown-unknown --test wasm

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false

  no-std-build:
    name: no_std host build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - run: cargo build --no-default-features
      - run: cargo build --no-default-features --features serde
      - run: cargo test --no-default-features --lib
      # Build all examples under default features to catch any missing
      # required-features = ["std"] declarations on examples that use
      # std-gated APIs (rand::random, no-arg shuffle, draw_random, etc.).
      # Examples with required-features matching off are silently skipped
      # by Cargo, so this is what enforces the gating discipline.
      - run: cargo build --no-default-features --examples

  no-std-thumbv7em:
    name: no_std bare-metal target
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: thumbv7em-none-eabihf
      - run: cargo build --no-default-features --target thumbv7em-none-eabihf
      - run: cargo build --no-default-features --features serde --target thumbv7em-none-eabihf
      - run: cargo build --no-default-features --target thumbv7em-none-eabihf --example no_std_smoke
